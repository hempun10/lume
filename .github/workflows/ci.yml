name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint & format check
        run: npm run check

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  detect-database-changes:
    name: Detect Database Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            supabase:
              - 'supabase/migrations/**'
              - 'supabase/config.toml'

  database-migration-check:
    name: Database Migration Check
    needs: [detect-database-changes, code-quality]
    if: needs.detect-database-changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start -x realtime,storage,imgproxy,inbucket,pgadmin-schema-diff,migra,pgbouncer,vector,edge-runtime

      - name: Write .env from Supabase status
        run: |
          supabase status -o env | sed \
            -e 's/^API_URL=/SUPABASE_URL=/' \
            -e 's/^SERVICE_ROLE_KEY=/SUPABASE_SECRET_KEY=/' \
            -e 's/^ANON_KEY=/VITE_SUPABASE_ANON_KEY=/' \
            > .env
          grep '^SUPABASE_URL=' .env | sed 's/^SUPABASE_URL=/VITE_SUPABASE_URL=/' >> .env

      - name: Verify migrations apply cleanly
        run: supabase db reset

      - name: Check for schema drift
        run: |
          DIFF=$(supabase db diff --schema public)
          if [ -n "$DIFF" ]; then
            echo "Schema drift detected!"
            echo "$DIFF"
            exit 1
          fi

      - name: Regenerate types and build
        run: |
          npm run db:types
          npm run build
